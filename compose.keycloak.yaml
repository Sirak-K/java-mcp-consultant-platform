# compose.keycloak.yaml
# Local Keycloak identity provider for OAuth2/OIDC development.
#
# Usage:
#   1. Copy .env.example to .env and set the Keycloak values.
#   2. Run: docker compose -f compose.keycloak.yaml up -d
#
# Admin UI:
#   http://localhost:${KEYCLOAK_PORT:-8090}
#
# Required environment variables:
#   KC_BOOTSTRAP_ADMIN_USERNAME
#   KC_BOOTSTRAP_ADMIN_PASSWORD
#
# MCP server issuer URI shape:
#   http://<keycloak-host>:8080/realms/<realm-name>

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:?Set KC_BOOTSTRAP_ADMIN_USERNAME in .env or the shell environment}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?Set KC_BOOTSTRAP_ADMIN_PASSWORD in .env or the shell environment}
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8090}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - mcp-keycloak-network

volumes:
  keycloak_data:
    driver: local

networks:
  mcp-keycloak-network:
    driver: bridge
